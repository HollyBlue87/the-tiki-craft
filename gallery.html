<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Experience unforgettable island adventures aboard The Tiki Craft in Tobago."
    />
    <!--Title-->
    <title>The Tiki Craft</title>

    <!--Favicon-->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/images/favicon-16x16.png"
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!--Custom css -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <header>
      <!--Bootstrap Navbar-->
      <nav class="navbar navbar-expand-lg navbar-dark custom-navbar fixed-top">
        <div class="container-fluid">
          <a href="index.html" aria-label="Go To Homepage">
            <img
              id="navbar-logo"
              src="assets/images/beach-logo.png"
              width="90"
              height="80"
              alt="Palm Tree"
            />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="voyage.html">The Voyage</a>
              </li>
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-label="active"
                  href="gallery.html"
                  >Gallery</a
                >
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#">Contact</a>
              </li>
            </ul>
            <a type="button" class="btn" id="book-btn" href="booking.html"
              >Book Now</a
            >
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section id="gallery-hero">
        <div class="hero-content text-end">
          <h1 class="hero-title">GALLERY</h1>
          <p class="hero-text">Life aboard the<br>Tiki Craft.</p>
        </div>
      </section>

      <section id="about-gallery">
        <div class="container">
          <div class="row col-12 text-center py-5">
            <p class="section-info-inv mb-3">✦ Moments Worth Sharing ✦</p>

            <h2 class="section-title-inv mb-3">MEMORIES MADE ON THE WATER</h2>

            <p class="section-text-inv">
              Discover unforgettable moments aboard the Tiki Craft, from scenic cruises to celebrations on the water.
            </p>
          </div>
        </div>
      </section>

      <section id="gallery-grid" class="py-5">
        <div class="container">
            <div class="row g-4">

                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/group-party.webp" alt="A group of people posing for a picture on the tiki craft" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/buccoo-reef.webp" alt="A picture of Buccoo reef" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/drink-pour.webp" alt="A man pouring a drink into a womans mouth" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/in-water-pose.webp" alt="Two women posing in the water outside the Tiki Craft" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/sunset-staff.webp" alt="The sunset from the deck of the Tiki Craft and a staff member" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/night-party.webp" alt="People partying in the water at night" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/jet-ski.webp" alt="Jet ski and people in the water" class="img-fluid rounded">
                </div>
                
                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/pour-drinks.webp" alt="People pouring drinks on the tiki craft" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/sunset-pose.webp" alt="A woman posing on the rail of the tiki craft" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <img src="assets/images/group-water-pose.webp" alt="A group of people posing in the water" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <img src="assets/images/tiki-sunset.webp" alt="Sunset from the deck of the tiki craft" class="img-fluid rounded">
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <img src="assets/images/night-water.webp" alt="A group of people posing in the water at night" class="img-fluid rounded">
                </div>

            </div>
        </div>
      </section>
    </main>
    <footer>Footer</footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
